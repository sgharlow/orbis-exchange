<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="'IBM Plex Mono', ui-monospace, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070b14"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="dsql" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3a4a"/>
      <stop offset="1" stop-color="#0a2540"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f7aa6"/>
    </marker>
  </defs>

  <rect width="960" height="660" fill="url(#bg)"/>
  <text x="48" y="52" fill="#eef3ff" font-size="26" font-family="Fraunces, Georgia, serif" font-style="italic">Orbis Exchange</text>
  <text x="48" y="76" fill="#5f7aa6" font-size="12" letter-spacing="3">ARCHITECTURE · ONE LEDGER · ONE LIVING WORLD</text>

  <!-- Browser -->
  <g>
    <rect x="330" y="100" width="300" height="68" rx="10" fill="#0e1628" stroke="#2c4a6e"/>
    <text x="480" y="130" fill="#dce6fa" font-size="15" text-anchor="middle">Browser — Next.js UI</text>
    <text x="480" y="150" fill="#7f8fb0" font-size="11" text-anchor="middle">world view + market panel (one screen, two panels)</text>
  </g>

  <!-- Vercel -->
  <g>
    <rect x="270" y="216" width="420" height="92" rx="10" fill="#0e1628" stroke="#2c4a6e"/>
    <text x="480" y="244" fill="#dce6fa" font-size="15" text-anchor="middle">Vercel — Next.js App Router</text>
    <text x="480" y="266" fill="#7f8fb0" font-size="11" text-anchor="middle">edge reads · route handlers: /api/orders · /api/claims</text>
    <text x="480" y="284" fill="#7f8fb0" font-size="11" text-anchor="middle">SSE: /api/stream (tick · world delta · market)</text>
  </g>

  <!-- Aurora DSQL (hero) -->
  <g filter="url(#glow)">
    <rect x="300" y="360" width="360" height="104" rx="12" fill="url(#dsql)" stroke="#38e0f5" stroke-width="1.5"/>
  </g>
  <text x="480" y="392" fill="#9fe9f6" font-size="17" text-anchor="middle" font-weight="600">Amazon Aurora DSQL</text>
  <text x="480" y="414" fill="#cfe6ee" font-size="11" text-anchor="middle">canonical world + ledger · strongly consistent</text>
  <text x="480" y="432" fill="#cfe6ee" font-size="11" text-anchor="middle">no double-spend · no oversell · no reconciliation</text>
  <text x="480" y="452" fill="#7fb6c8" font-size="10.5" text-anchor="middle" letter-spacing="1">multi-region active-active — no app-level coordination</text>

  <!-- Simulation worker -->
  <g>
    <rect x="60" y="520" width="360" height="96" rx="10" fill="#0e1628" stroke="#2c4a6e"/>
    <text x="240" y="548" fill="#dce6fa" font-size="14" text-anchor="middle">Simulation worker (off-Vercel)</text>
    <text x="240" y="570" fill="#7f8fb0" font-size="11" text-anchor="middle">cellular-automaton tick · delta persist</text>
    <text x="240" y="588" fill="#7f8fb0" font-size="11" text-anchor="middle">mining of owned cells · the 3s heartbeat</text>
  </g>

  <!-- Agent worker -->
  <g>
    <rect x="540" y="520" width="360" height="96" rx="10" fill="#0e1628" stroke="#2c4a6e"/>
    <text x="720" y="548" fill="#dce6fa" font-size="14" text-anchor="middle">AI agent worker</text>
    <text x="720" y="570" fill="#7f8fb0" font-size="11" text-anchor="middle">maker · momentum · value · scout</text>
    <text x="720" y="588" fill="#7f8fb0" font-size="11" text-anchor="middle">first-class players · same order path · 0 inference</text>
  </g>

  <!-- arrows -->
  <line x1="480" y1="168" x2="480" y2="212" stroke="#5f7aa6" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="492" y="194" fill="#6f86b3" font-size="10">HTTPS · SSE</text>

  <line x1="480" y1="308" x2="480" y2="356" stroke="#5f7aa6" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="492" y="338" fill="#6f86b3" font-size="10">SQL · pg wire · IAM auth token</text>

  <line x1="300" y1="520" x2="395" y2="464" stroke="#5f7aa6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="500" fill="#6f86b3" font-size="10">deltas · settlement</text>

  <line x1="660" y1="520" x2="565" y2="464" stroke="#5f7aa6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="600" y="500" fill="#6f86b3" font-size="10" text-anchor="end">orders (human path)</text>

  <text x="480" y="644" fill="#5a6a8c" font-size="11" text-anchor="middle" font-style="italic" font-family="Fraunces, Georgia, serif">the field and the book are the same ledger, seen two ways</text>
</svg>
